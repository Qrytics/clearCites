version: "3.9"

services:
  # ── Neo4j graph database ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: clearcites-neo4j
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-clearcites}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Graph API (FastAPI) ─────────────────────────────────────────────────
  graph_api:
    build:
      context: .
      dockerfile: services/graph_api/Dockerfile
    container_name: clearcites-api
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-clearcites}"
      SEMANTIC_SCHOLAR_API_KEY: "${SEMANTIC_SCHOLAR_API_KEY:-}"
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./services:/app/services
      - ./data_pipeline:/app/data_pipeline

  # ── React frontend (Next.js) ────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: clearcites-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - graph_api
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  neo4j_data:
  neo4j_logs:
